<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Minimal Multitrack Player</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #222;
                display: grid;
                place-content: center;
                min-height: 100vh;
                margin: 0;
                padding: 1rem;
            }
            multitrack-player {
                width: 90vw;
                max-width: 700px;
            }
            .note {
                margin-top: 1rem;
                font-size: 0.875rem;
                color: #666;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <multitrack-player
            id="player"
            stylesheet="../dist/multitrack-player.css"
        ></multitrack-player>

        <p class="note">
            Provide your own track JSON and audio files. See
            <code>public/tracks-whats.json</code> for the schema.
        </p>

        <script type="module">
            import "../src/components/multitrack-player/multitrack-player.js";

            const player = document.getElementById("player");

            // Load track sets programmatically
            player.loadTrackSets({
                "What's Going On?": {
                    src: "../public/tracks-whats.json",
                    description: "Marvin Gaye - What's Going On?",
                },
            });
        </script>
    </body>
</html>
